<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrikX - Contact Us</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo-container">
        <img src="img/brikxxx.png" alt="BrikX Logo" class="logo">
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <div class="hamburger">
        <span></span><span></span><span></span>
      </div>
    </nav>
  </header>

  <main>
    <section class="section">
      <div class="watermark"><img src="img/Brix.png" alt=""></div>
      <div class="content">
        <h2>Get in Touch</h2>
        <p>Ready to start your next project? We'd love to hear from you.</p>

        <form class="contact-form">
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Email Address" required>
          <textarea placeholder="Your Message" rows="6" required></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 BrikX — Constructing Smart Experiences</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
